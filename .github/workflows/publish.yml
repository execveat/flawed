name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) when a GitHub Release is
# published. No tokens or secrets: PyPI is configured to trust this repo's
# `publish.yml` workflow running in the `pypi` environment.
#
# Trigger ONLY on a published Release. Pushing to main, pushing a tag, or
# saving a draft does not publish — only clicking "Publish release" does.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build & validate distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Build the exact tagged commit, never whatever main happens to be.
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Guard — release tag must match pyproject version
        run: |
          tag="${{ github.event.release.tag_name }}"
          ver="$(python -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "release tag: $tag | pyproject version: $ver"
          if [ "$tag" != "v$ver" ]; then
            echo "::error::tag '$tag' does not match pyproject version 'v$ver' — aborting before any upload."
            exit 1
          fi

      - name: Build sdist + wheel and validate metadata
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mandatory for trusted publishing
    environment:
      name: pypi
      url: https://pypi.org/p/flawed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
